<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calunga — Red Hat Trusted Libraries</title>
<link rel="stylesheet" href="static/style.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-title"><span>Calunga</span> Learn</div>
  <nav>
    {% for item in sidebar %}
    {% if item.section is defined %}
    <div class="section-label">{{ item.section }}</div>
    {% else %}
    <a href="#{{ item.href }}">{{ item.label }}</a>
    {% endif %}
    {% endfor %}
  </nav>
</aside>

<!-- Main content -->
<main class="main">
{% for section in sections %}
<section id="{{ section.id }}">
{{ section.content }}
</section>
{% endfor %}
</main>

<button class="back-to-top" onclick="window.scrollTo({top:0})" title="Back to top">&uarr;</button>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
mermaid.initialize({
  startOnLoad: true,
  theme: 'dark',
  themeVariables: {
    primaryColor: '#1a237e',
    primaryTextColor: '#fff',
    primaryBorderColor: '#ee0000',
    lineColor: '#ee0000',
    secondaryColor: '#004d40',
    tertiaryColor: '#1a1a2e',
    fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif',
    fontSize: '14px'
  },
  flowchart: { curve: 'basis', padding: 10 },
  sequence: { mirrorActors: false }
});

const sections = document.querySelectorAll('section[id]');
const navLinks = document.querySelectorAll('.sidebar nav a[href^="#"]');
const backToTop = document.querySelector('.back-to-top');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      navLinks.forEach(a => a.classList.remove('active'));
      const active = document.querySelector(`.sidebar nav a[href="#${entry.target.id}"]`);
      if (active) active.classList.add('active');
    }
  });
}, { rootMargin: '-20% 0px -70% 0px' });

sections.forEach(s => observer.observe(s));

window.addEventListener('scroll', () => {
  backToTop.classList.toggle('visible', window.scrollY > 400);
});
</script>
</body>
</html>
